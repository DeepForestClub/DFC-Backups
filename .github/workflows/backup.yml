name: Website Backup and Upload

on:
  schedule:
    # 每周日凌晨2点运行备份（UTC时间）
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      description:
        description: '手动备份描述'
        required: false
        default: 'Manual backup'

env:
  BACKUP_DIR: 'backups'
  MAX_BACKUPS: 10  # 保留最近10个备份

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Check current branch
      run: |
        echo "当前分支:"
        git branch -a
        echo "远程仓库:"
        git remote -v
        
    - name: Clean old backups
      run: |
        # 删除超过保留数量的旧备份
        ls -t *.tar.gz 2>/dev/null | tail -n +$((MAX_BACKUPS + 1)) | xargs -r rm -f || echo "无旧备份可删除"
        
    - name: Install HTTrack
      run: |
        sudo apt-get update
        sudo apt-get install -y httrack
        
    - name: Create backup directory
      run: mkdir -p ${{ env.BACKUP_DIR }}
      
    - name: Test network connectivity
      run: |
        echo "测试网络连接:"
        curl -I "https://deep-forest-club.wikidot.com" || echo "curl测试失败"
        
    - name: Run HTTrack backup
      run: |
        httrack "https://deep-forest-club.wikidot.com" \
          -O ./${{ env.BACKUP_DIR }} \
          -%v \
          -r2 \
          -N "%h%p/%n.%t" \
          -#L1000 \
          --robots=0 \
          --timeout=60 \
          --retries=5 \
          --user-agent "Mozilla/5.0 (compatible; HTTrack)"
      timeout-minutes: 45
      
    - name: Verify backup content
      run: |
        echo "备份文件夹内容："
        ls -la ${{ env.BACKUP_DIR }}/
        echo "文件数量统计："
        find ${{ env.BACKUP_DIR }} -type f 2>/dev/null | wc -l || echo "未找到文件"
        
    - name: Compress backup
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        tar -czf "backup-${TIMESTAMP}.tar.gz" ${{ env.BACKUP_DIR }}/
        rm -rf ${{ env.BACKUP_DIR }}
        echo "BACKUP_FILE=backup-${TIMESTAMP}.tar.gz" >> $GITHUB_ENV
        
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Check for changes
      id: changes
      run: |
        git status --porcelain
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push backup
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git add *.tar.gz
        git commit -m "🔧 Backup: ${{ github.event.inputs.description || 'Automated backup' }} [skip ci]"
        # 自动检测并推送到当前分支
        CURRENT_BRANCH=$(git branch --show-current)
        git push origin $CURRENT_BRANCH
