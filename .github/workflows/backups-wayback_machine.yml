name: Archive to Wayback Machine

on:
  schedule:
    # 每 7 天运行一次（UTC 时间）
    - cron: "0 3 * * 0"
  workflow_dispatch: # 支持手动触发

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive multiple pages
        run: |
          for url in \
            "https://deep-forest-club.wikidot.com/" \
            "https://deep-forest-club.wikidot.com/major" \
            "https://deep-forest-club.wikidot.com/forum:start" \
            "https://deep-forest-club.wikidot.com/system:list-all-pages"
          do
            echo "Archiving $url"
            curl -s -L --max-time 60 "https://web.archive.org/save/$url"
            sleep 10
          done
