name: иЗ™еК®е§ЗдїљзљСзЂЩ

concurrency:
  group: backup-wikit
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

on:
  schedule:
    - cron: '30 4 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-wikit:
    runs-on: ubuntu-latest

    env:
      WIKIT_BIN: "./wikit"
      BACKUP_ROOT: "backups/wikit"
      WIKI_NAME: "deep-forest-club"
      WIKI_URL: "https://deep-forest-club.wikidot.com"
      MAX_BACKUPS: "8"
      BACKUP_TIME_THRESHOLD: "3"

    steps:
      - name: ж£АеЗЇдїУеЇУдї£з†Б
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: дЄЛиљљ Wikit CLI
        run: |
          set -euo pipefail
          URL="https://github.com/kakushi-w/wikit/releases/latest/download/wikit-linux-amd64"
          curl -fSL "$URL" -o wikit
          chmod +x wikit
          ./wikit version || true

      - name: еЗЖе§Зе§ЗдїљзЫЃељХеєґињРи°М Wikit CLI
        run: |
          set -euo pipefail

          mkdir -p "$BACKUP_ROOT"

          TS=$(date +%Y%m%d_%H%M%S)
          THIS_DIR="$BACKUP_ROOT/$TS"

          PREV=$(ls -1d "$BACKUP_ROOT"/*/ 2>/dev/null | sort -r | head -1 || true)

          if [ -n "$PREV" ] && [ -d "$PREV" ]; then
            echo "вЖТ Copying previous backup from $PREV"
            cp -r "$PREV" "$THIS_DIR"
          else
            echo "вЖТ No previous backup found, creating fresh directory"
            mkdir -p "$THIS_DIR"
          fi

          echo "вЖТ Running wikit backup into $THIS_DIR"

          # иЃ∞ељХеЉАеІЛжЧґйЧі
          START_SEC=$(date +%s)

          "$WIKIT_BIN" backup "$WIKI_NAME" \
            --base-dir "$THIS_DIR" \
            --no-update-check

          # иЃ°зЃЧиАЧжЧґ
          END_SEC=$(date +%s)
          ELAPSED=$((END_SEC - START_SEC))

          echo "вЖТ Backup elapsed time: ${ELAPSED}s"

          echo "BACKUP_TS=$TS" >> $GITHUB_ENV
          echo "BACKUP_ELAPSED=$ELAPSED" >> $GITHUB_ENV

      - name: еИ§жЦ≠жШѓеР¶йЬАи¶БжПРдЇ§
        id: check_sitemap
        run: |
          set -euo pipefail

          cd "$BACKUP_ROOT"

          CURRENT=$(ls -1d */ 2>/dev/null | sort -r | head -1)
          PREV=$(ls -1d */ 2>/dev/null | sort -r | head -2 | tail -1 || true)

          echo "CURRENT=$CURRENT"
          echo "PREV=$PREV"

          CURRENT_SITEMAP="$CURRENT/$WIKI_NAME/meta/sitemap.json"
          PREV_SITEMAP="$PREV/$WIKI_NAME/meta/sitemap.json"

          ELAPSED="${{ env.BACKUP_ELAPSED }}"
          THRESHOLD="${BACKUP_TIME_THRESHOLD}"

          echo "вЖТ Backup elapsed: ${ELAPSED}s (threshold: ${THRESHOLD}s)"

          # е¶ВжЮЬе§ЗдїљиАЧжЧґиґЕињЗйШИеАЉпЉМеЉЇеИґжПРдЇ§
          if [ "$ELAPSED" -ge "$THRESHOLD" ]; then
            echo "вЖТ Backup took >= ${THRESHOLD}s, force commit"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "reason=timeout" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$PREV" ] || [ ! -f "$PREV_SITEMAP" ]; then
            echo "вЖТ No previous sitemap found, must commit"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "reason=new" >> $GITHUB_OUTPUT
            exit 0
          fi

          if diff -q "$CURRENT_SITEMAP" "$PREV_SITEMAP" > /dev/null; then
            echo "вЖТ sitemap.json unchanged, skip commit"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=unchanged" >> $GITHUB_OUTPUT
          else
            echo "вЖТ sitemap.json changed"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "reason=changed" >> $GITHUB_OUTPUT
          fi

      - name: жЄЕзРЖжЧІе§Здїљ
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          ls -1trd */ 2>/dev/null | head -n -"$MAX_BACKUPS" | while IFS= read -r old; do
            echo "вЖТ Removing old backup: $old"
            rm -rf "$old"
          done
          echo "вЖТ Current backups:"
          ls -1d */ 2>/dev/null || echo "(none)"

      - name: жЫіжЦ∞ LATEST иљѓйУЊжО•жМЗеРСжЬАжЦ∞е§Здїљ
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          NEWEST=$(ls -1d */ 2>/dev/null | sort -r | head -1)
          if [ -z "$NEWEST" ]; then
            echo "::error::No backup directory found!"
            exit 1
          fi
          rm -f LATEST
          ln -s "$NEWEST" LATEST
          echo "вЖТ LATEST -> $NEWEST"

      - name: жПРдЇ§еєґжО®йАБе§ЗдїљзїУжЮЬ
        if: steps.check_sitemap.outputs.skip == 'false'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "иЗ™еК®е§ЗдїљзљСзЂЩ - ${{ env.BACKUP_TS }}пЉИ${{ steps.check_sitemap.outputs.reason }}пЉЙ"
          file_pattern: "backups/wikit/"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: иЈ≥ињЗжПРдЇ§жПРз§Ї
        if: steps.check_sitemap.outputs.skip == 'true'
        run: echo "[!] жЬ™еПСзФЯеПШеМЦпЉМеЈ≤иЈ≥ињЗжПРдЇ§гАВ"
