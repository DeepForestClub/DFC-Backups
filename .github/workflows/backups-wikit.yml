name: 自动备份网站

concurrency:
  group: backup-wikit
  cancel-in-progress: false

on:
  schedule:
    - cron: '30 4 */4 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-wikit:
    runs-on: ubuntu-latest

    env:
      WIKIT_VER: "0.1.4"
      WIKIT_BIN: "./wikit"
      BACKUP_ROOT: "backups/wikit"
      WIKI_NAME: "deep-forest-club"
      WIKI_URL: "https://deep-forest-club.wikidot.com"
      MAX_BACKUPS: "8"

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 下载 Wikit CLI
        run: |
          set -euo pipefail
          URL="https://github.com/kakushi-w/wikit/releases/download/v${WIKIT_VER}/wikit-linux-amd64"
          curl -fSL "$URL" -o wikit
          chmod +x wikit
          ./wikit version || true

      - name: 准备备份目录并运行 Wikit CLI
        run: |
          set -euo pipefail

          mkdir -p "$BACKUP_ROOT"

          TS=$(date +%Y%m%d-%H%M%S)
          THIS_DIR="$BACKUP_ROOT/$TS"

          PREV=$(ls -1d "$BACKUP_ROOT"/*/ 2>/dev/null | sort -r | head -1 || true)

          if [ -n "$PREV" ] && [ -d "$PREV" ]; then
            echo "→ Copying previous backup from $PREV"
            cp -r "$PREV" "$THIS_DIR"
          else
            echo "→ No previous backup found, creating fresh directory"
            mkdir -p "$THIS_DIR"
          fi

          echo "→ Running wikit backup into $THIS_DIR"
          "$WIKIT_BIN" backup "$WIKI_NAME" "$WIKI_URL" \
            --base-dir "$THIS_DIR" \
            --no-update-check

          echo "BACKUP_TS=$TS" >> $GITHUB_ENV

      - name: 清理旧备份
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          ls -1trd */ 2>/dev/null | head -n -"$MAX_BACKUPS" | while IFS= read -r old; do
            echo "→ Removing old backup: $old"
            rm -rf "$old"
          done
          echo "→ Current backups:"
          ls -1d */ 2>/dev/null || echo "(none)"

      - name: 更新 LATEST 软链接指向最新备份
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          NEWEST=$(ls -1d */ 2>/dev/null | sort -r | head -1)
          if [ -z "$NEWEST" ]; then
            echo "::error::No backup directory found!"
            exit 1
          fi
          rm -f LATEST
          ln -s "$NEWEST" LATEST
          echo "→ LATEST -> $NEWEST"

      - name: 提交并推送备份结果
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动备份网站 - ${{ env.BACKUP_TS }}"
          file_pattern: "backups/wikit/"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"