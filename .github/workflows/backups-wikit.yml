name: 自动备份网站

concurrency:
  group: backup-wikit
  cancel-in-progress: false

on:
  schedule:
    - cron: '30 4 */4 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-wikit:
    runs-on: ubuntu-latest

    env:
      WIKIT_VER: "0.1.4"
      WIKIT_BIN: "./wikit"
      BACKUP_ROOT: "backups/wikit"
      WIKI_NAME: "deep-forest-club"
      WIKI_URL: "https://deep-forest-club.wikidot.com"
      SITEMAP_URL: "https://deep-forest-club.wikidot.com/sitemap.xml"
      MAX_BACKUPS: "8"

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 检测 sitemap 是否发生变化
      - name: 检测站点内容是否变化
        id: check_sitemap
        run: |
          set -euo pipefail

          echo "→ Downloading remote sitemap.xml"
          for i in {1..3}; do
            if curl -fSL "$SITEMAP_URL" -o /tmp/sitemap.remote.xml; then
              break
            fi
            echo "::warning::Download failed, retrying ($i/3)..."
            sleep 5
          done

          if [ ! -f /tmp/sitemap.remote.xml ]; then
            echo "::error::Failed to download sitemap.xml after retries"
            exit 1
          fi

          LOCAL_SITEMAP="$BACKUP_ROOT/LATEST/sitemap.xml"

          if [ -f "$LOCAL_SITEMAP" ]; then
            if diff -q /tmp/sitemap.remote.xml "$LOCAL_SITEMAP" >/dev/null; then
              echo "→ Sitemap unchanged, skipping backup"
              echo "CHANGED=false" >> "$GITHUB_OUTPUT"
            else
              echo "→ Sitemap changed, will backup"
              echo "CHANGED=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "→ No local sitemap found, will backup"
            echo "CHANGED=true" >> "$GITHUB_OUTPUT"
          fi

      # 仅在发生变化时执行后续步骤
      - name: 下载 Wikit CLI
        if: steps.check_sitemap.outputs.CHANGED == 'true'
        run: |
          set -euo pipefail
          URL="https://github.com/kakushi-w/wikit/releases/download/v${WIKIT_VER}/wikit-linux-amd64"
          curl -fSL "$URL" -o wikit
          chmod +x wikit
          ./wikit version || true

      - name: 准备备份目录并运行 Wikit CLI
        if: steps.check_sitemap.outputs.CHANGED == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$BACKUP_ROOT"

          TS=$(date +%Y%m%d_%H%M%S)
          THIS_DIR="$BACKUP_ROOT/$TS"

          PREV=$(ls -1d "$BACKUP_ROOT"/*/ 2>/dev/null | sort -r | head -1 || true)

          if [ -n "$PREV" ] && [ -d "$PREV" ]; then
            echo "→ Copying previous backup from $PREV"
            cp -r "$PREV" "$THIS_DIR"
          else
            echo "→ No previous backup found, creating fresh directory"
            mkdir -p "$THIS_DIR"
          fi

          echo "→ Running wikit backup into $THIS_DIR"
          "$WIKIT_BIN" backup "$WIKI_NAME" \
            --base-dir "$THIS_DIR" \
            --no-update-check

          echo "BACKUP_TS=$TS" >> "$GITHUB_ENV"

      - name: 保存 sitemap.xml
        if: steps.check_sitemap.outputs.CHANGED == 'true'
        run: |
          set -euo pipefail
          THIS_DIR="$BACKUP_ROOT/${{ env.BACKUP_TS }}"
          cp /tmp/sitemap.remote.xml "$THIS_DIR/sitemap.xml"
          echo "→ Saved sitemap.xml to $THIS_DIR"

      - name: 清理旧备份
        if: steps.check_sitemap.outputs.CHANGED == 'true'
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          ls -1trd */ 2>/dev/null | head -n -"$MAX_BACKUPS" | while IFS= read -r old; do
            echo "→ Removing old backup: $old"
            rm -rf "$old"
          done
          echo "→ Current backups:"
          ls -1d */ 2>/dev/null || echo "(none)"

      - name: 更新 LATEST 软链接指向最新备份
        if: steps.check_sitemap.outputs.CHANGED == 'true'
        run: |
          set -euo pipefail
          cd "$BACKUP_ROOT"
          NEWEST=$(ls -1d */ 2>/dev/null | sort -r | head -1)
          if [ -z "$NEWEST" ]; then
            echo "::error::No backup directory found!"
            exit 1
          fi
          rm -f LATEST
          ln -s "$NEWEST" LATEST
          echo "→ LATEST -> $NEWEST"

      - name: 提交并推送备份结果
        if: steps.check_sitemap.outputs.CHANGED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动备份网站 - ${{ env.BACKUP_TS }}"
          file_pattern: "backups/wikit/"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"